<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Hot Wings Restaurant</title>

<style>

body{
margin:0;
font-family: 'Segoe UI', sans-serif;
background:#f5f5f5;
color:#333;
}

header{
background:#8b0000;
color:white;
padding:20px;
text-align:center;
}

h1{
margin:0;
}

.container{
padding:20px;
max-width:900px;
margin:auto;
}

.category{
margin-top:30px;
}

.category h2{
border-bottom:2px solid #ddd;
padding-bottom:5px;
}

.food{
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
display:flex;
justify-content:space-between;
align-items:center;
}

.food-name{
font-weight:500;
}

.qty{
display:flex;
align-items:center;
gap:10px;
}

button{
background:#ff6b00;
border:none;
color:white;
width:35px;
height:35px;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#e85f00;
}

.cart{
background:white;
padding:20px;
margin-top:30px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}

.orderbtn{
background:#8b0000;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.orderbtn:hover{
background:#6f0000;
}

</style>

</head>

<body>

<header>

<h1>🔥 Hot Wings Restaurant</h1>
<p>Online Food Ordering & Table Booking</p>

</header>

<div class="container">

<div id="menu"></div>

<div class="cart">

<h2>Your Cart</h2>

<ul id="cart"></ul>

<h3>Total ₹<span id="total">0</span></h3>

<input id="name" placeholder="Customer Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">

<button class="orderbtn" onclick="sendOrder()">Order on WhatsApp</button>

</div>


<div class="cart">

<h2>Book Table</h2>

<input id="bname" placeholder="Name">
<input id="bphone" placeholder="Phone">

<input id="bdate" type="date">
<input id="btime" type="time">

<select id="bpersons">

<option>2 Persons</option>
<option>4 Persons</option>
<option>6 Persons</option>
<option>10 Persons</option>

</select>

<button class="orderbtn" onclick="bookTable()">Book Table</button>

</div>

</div>

<script>

let menu={

"Pizza":[
{name:"Paneer Veggies Pizza",price:210},
{name:"Corn Paneer Pizza",price:220},
{name:"Blockbuster Pizza",price:260},
{name:"Chicken Pizza",price:280},
{name:"Loaded All In One",price:300}
],

"Momos":[
{name:"Chicken Momo",price:70},
{name:"Veg Momo",price:50}
],

"Burgers":[
{name:"Veg Burger",price:90},
{name:"Chicken Burger",price:130}
],

"Drinks":[
{name:"Masala Coke",price:40},
{name:"Lassi",price:60}
]

}

let cart={}

function buildMenu(){

let container=document.getElementById("menu")

for(let category in menu){

let section=document.createElement("div")
section.className="category"

let title=document.createElement("h2")
title.innerText=category

section.appendChild(title)

menu[category].forEach(food=>{

let div=document.createElement("div")
div.className="food"

div.innerHTML=`

<div class="food-name">${food.name} ₹${food.price}</div>

<div class="qty">

<button onclick="change('${food.name}',${food.price},-1)">-</button>

<span id="${food.name}">0</span>

<button onclick="change('${food.name}',${food.price},1)">+</button>

</div>

`

section.appendChild(div)

})

container.appendChild(section)

}

}

function change(name,price,val){

if(!cart[name]) cart[name]={q:0,p:price}

cart[name].q+=val

if(cart[name].q<0) cart[name].q=0

document.getElementById(name).innerText=cart[name].q

updateCart()

}

function updateCart(){

let list=document.getElementById("cart")
list.innerHTML=""

let total=0

for(let item in cart){

if(cart[item].q>0){

let li=document.createElement("li")
li.innerText=item+" x "+cart[item].q

list.appendChild(li)

total+=cart[item].q*cart[item].p

}

}

document.getElementById("total").innerText=total

}

function sendOrder(){

let msg="Food Order:%0A"

for(let item in cart){

if(cart[item].q>0){

msg+=item+" x "+cart[item].q+"%0A"

}

}

msg+="Name:"+document.getElementById("name").value+"%0A"
msg+="Phone:"+document.getElementById("phone").value+"%0A"
msg+="Address:"+document.getElementById("address").value

window.open("https://wa.me/919957603281?text="+msg)

}

function bookTable(){

let msg="Table Booking:%0A"

msg+="Name:"+document.getElementById("bname").value+"%0A"
msg+="Phone:"+document.getElementById("bphone").value+"%0A"
msg+="Date:"+document.getElementById("bdate").value+"%0A"
msg+="Time:"+document.getElementById("btime").value+"%0A"
msg+="Persons:"+document.getElementById("bpersons").value

window.open("https://wa.me/919957603281?text="+msg)

}

buildMenu()

</script>

</body>
</html>
