<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Hot Wings Restaurant</title>

<style>

font-family:Arial;
margin:0;
background:#111;
color:white;
}

header{
background:black;
padding:20px;
text-align:center;
}

h1{
color:orange;
}

.section{
margin:30px;
}

.menu{
display:flex;
flex-wrap:wrap;
gap:15px;
}

.item{
background:#222;
padding:15px;
border-radius:10px;
width:200px;
text-align:center;
}

button{
background:orange;
border:none;
padding:8px 12px;
border-radius:5px;
cursor:pointer;
}

input,select{
display:block;
margin:10px auto;
padding:10px;
width:250px;
border-radius:5px;
border:none;
}

.cart{
background:#000;
padding:20px;
margin:20px;
}

</style>

<body>

<header>

<h1>🔥 Hot Wings Restaurant</h1>

<p>Online Food Order & Table Booking</p>

</header>

<div id="menuContainer"></div>

<div class="cart">

<h2>Your Cart</h2>

<ul id="cart"></ul>

<h3>Total ₹<span id="total">0</span></h3>

<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Delivery Address">

<button onclick="order()">Place Order</button>

</div>

<div class="cart">

<h2>Book a Table</h2>

<input placeholder="Name">
<input placeholder="Phone">

<input type="date">
<input type="time">

<select>

<option>2 Persons</option>
<option>4 Persons</option>
<option>6 Persons</option>
<option>10 Persons</option>

</select>

<button onclick="alert('Table booked successfully')">Book Table</button>

</div>

let cart=[]
let total=0

function buildMenu(){

let container=document.getElementById("menuContainer")

for(let category in menu){

let section=document.createElement("div")
section.className="section"

let title=document.createElement("h2")
title.innerText=category

section.appendChild(title)

let menuBox=document.createElement("div")
menuBox.className="menu"

menu[category].forEach(food=>{

let item=document.createElement("div")
item.className="item"

item.innerHTML="<h4>"+food+"</h4><p>₹120</p><button onclick=\"add('"+food+"',120)\">Add</button>"

menuBox.appendChild(item)

})

section.appendChild(menuBox)

container.appendChild(section)

}

}

function add(name,price){

cart.push({name,price})

total+=price

update()

}

function update(){

let list=document.getElementById("cart")

list.innerHTML=""

cart.forEach(item=>{

let li=document.createElement("li")

li.innerText=item.name+" ₹"+item.price

list.appendChild(li)

})

document.getElementById("total").innerText=total

}

function order(){

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let address=document.getElementById("address").value

let msg="New Order:%0A"

cart.forEach(item=>{
msg+=item.name+" ₹"+item.price+"%0A"
})

msg+="Total: ₹"+total+"%0A"
msg+="Name:"+name+"%0A"
msg+="Phone:"+phone+"%0A"
msg+="Address:"+address

window.open("https://wa.me/919957603281?text="+msg)

}

buildMenu()

</script>
